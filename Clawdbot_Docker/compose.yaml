services:
  clawdbot-gateway:
    image: ${OPENCLAW_IMAGE:-clawdbot:local}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        OPENCLAW_EXTENSIONS: ${OPENCLAW_EXTENSIONS:-}
        OPENCLAW_DOCKER_APT_PACKAGES: ${OPENCLAW_DOCKER_APT_PACKAGES:-}
        OPENCLAW_INSTALL_BROWSER: ${OPENCLAW_INSTALL_BROWSER:-}
        OPENCLAW_INSTALL_DOCKER_CLI: ${OPENCLAW_INSTALL_DOCKER_CLI:-}
    env_file:
      - .env
    user: "1000:1000"
    environment:
      HOME: /home/node
      TERM: xterm-256color
    volumes:
      - ./data/config:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
      - ./iran-war:/home/node/.openclaw/workspace-iran-war
      - ../src:/app/src:ro
      - ../apps/shared/OpenClawKit/Sources/OpenClawKit/Resources:/app/apps/shared/OpenClawKit/Sources/OpenClawKit/Resources:ro
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    entrypoint: ["node", "openclaw.mjs"]
    command:
      [
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-loopback}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  clawdbot-cli:
    image: ${OPENCLAW_IMAGE:-clawdbot:local}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        OPENCLAW_EXTENSIONS: ${OPENCLAW_EXTENSIONS:-}
        OPENCLAW_DOCKER_APT_PACKAGES: ${OPENCLAW_DOCKER_APT_PACKAGES:-}
        OPENCLAW_INSTALL_BROWSER: ${OPENCLAW_INSTALL_BROWSER:-}
        OPENCLAW_INSTALL_DOCKER_CLI: ${OPENCLAW_INSTALL_DOCKER_CLI:-}
    env_file:
      - .env
    network_mode: "service:clawdbot-gateway"
    user: "1000:1000"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo
    volumes:
      - ./data/config:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
      - ./iran-war:/home/node/.openclaw/workspace-iran-war
      - ../src:/app/src:ro
      - ../apps/shared/OpenClawKit/Sources/OpenClawKit/Resources:/app/apps/shared/OpenClawKit/Sources/OpenClawKit/Resources:ro
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "openclaw.mjs"]
    depends_on:
      - clawdbot-gateway
